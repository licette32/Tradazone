# Staging API Gateway Configuration (Nginx)
# This file defines how the API gateway routes requests to the backend services.

server {
    listen 80;
    server_name api-staging.tradazone.com;

    # Backend API Proxy
    location /api/ {
        proxy_pass http://backend-api-staging:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout and Retry settings
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Webhook Proxy
    location /events/ {
        proxy_pass http://webhook-service-staging:4000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Buffer settings for webhook payloads
        client_max_body_size 1m;
    }

    # Health Check
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
