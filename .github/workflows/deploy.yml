name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        # This repo does not commit npm/yarn lockfiles, so npm ci and npm cache
        # setup cannot run on GitHub Actions.
        run: npm install --legacy-peer-deps



      - name: Lint
        run: npm run lint

      - name: Run unit tests with coverage
        run: npm run test:coverage

  deploy:
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        # This repo does not commit npm/yarn lockfiles, so npm ci and npm cache
        # setup cannot run on GitHub Actions.
        run: npm install --legacy-peer-deps


      - name: Build (production mode)
        # Vite loads .env.production — VITE_BASE_PATH and VITE_APP_ENV come from there
        run: npm run build -- --mode production

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
