name: Bundle Size Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  size-check:
    name: Check bundle size limits (Issue #162)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        # This repo does not commit npm/yarn lockfiles, so npm ci and npm cache
        # setup cannot run on GitHub Actions.
        run: npm install --legacy-peer-deps


      - name: Build project
        run: npm run build

      - name: Run size-limit check
        id: size_limit
        run: |
          echo "## 📦 Bundle Size Report (Issue #162)" > bundle-report.md
          echo "" >> bundle-report.md
          echo "Checking bundle sizes against defined limits..." >> bundle-report.md
          echo "" >> bundle-report.md
          
          # Run size-limit and capture output for the report
          npx size-limit --json > size-report.json || true
          echo "Raw size-report.json:"
          cat size-report.json

          
          echo "### Individual Chunk Sizes" >> bundle-report.md
          echo "| Chunk Name | Size (gzip) | Limit | Status |" >> bundle-report.md
          echo "| :--- | :--- | :--- | :--- |" >> bundle-report.md
          
          # Parse JSON output to create a markdown table (requires jq)
          # We use a simple fallback if jq is not available or JSON is malformed
          cat size-report.json | node -e '
            const fs = require("fs");
            try {
              const data = JSON.parse(fs.readFileSync(0, "utf-8"));
              data.forEach(item => {
                const status = item.passed ? "✅" : "❌";
                console.log(`| ${item.name || item.path} | ${(item.size/1024).toFixed(2)} KB | ${(item.limit/1024).toFixed(2)} KB | ${status} |`);
              });
            } catch (e) {
              console.log("| Error | Failed to parse size-limit output | - | - |");
            }
          ' >> bundle-report.md
          
          echo "" >> bundle-report.md
          echo "Total build directory size: $(du -sh dist/ | cut -f1)" >> bundle-report.md
          
          # Output to console
          cat bundle-report.md
          
          # Now run it for real to fail the job if needed
          npm run size
        shell: bash

      - name: Upload bundle report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bundle-report
          path: |
            dist/
            bundle-report.md
            size-report.json

      - name: Report failing sizes to PR
        if: failure() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('bundle-report.md')) {
              const report = fs.readFileSync('bundle-report.md', 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: "🚨 **Bundle size limits exceeded!**\n\n" + report
              });
            } else {
              console.log('No bundle-report.md found, skipping PR comment.');
            }

