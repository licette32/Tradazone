<!DOCTYPE html>
<html>
<head>
    <title>Form Validation Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 200px; }
        .error { color: red; font-size: 12px; margin-top: 5px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .success { color: green; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Form Validation Test</h1>
    
    <h2>Add Customer Form Test</h2>
    <form id="customerForm">
        <div class="form-group">
            <label for="name">Customer Name *</label>
            <input type="text" id="name" name="name" />
            <div class="error" id="nameError"></div>
        </div>
        
        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" />
            <div class="error" id="emailError"></div>
        </div>
        
        <button type="submit">Add Customer</button>
        <div class="success" id="customerSuccess"></div>
    </form>

    <h2>Create Checkout Form Test</h2>
    <form id="checkoutForm">
        <div class="form-group">
            <label for="title">Title *</label>
            <input type="text" id="title" name="title" />
            <div class="error" id="titleError"></div>
        </div>
        
        <div class="form-group">
            <label for="amount">Amount *</label>
            <input type="number" id="amount" name="amount" step="0.01" />
            <div class="error" id="amountError"></div>
        </div>
        
        <button type="submit">Create Checkout</button>
        <div class="success" id="checkoutSuccess"></div>
    </form>

    <script>
        // Customer form validation (mimics our React component logic)
        document.getElementById('customerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            
            // Clear previous errors
            document.getElementById('nameError').textContent = '';
            document.getElementById('emailError').textContent = '';
            document.getElementById('customerSuccess').textContent = '';
            
            let hasErrors = false;
            
            // Validate name
            if (!name.trim()) {
                document.getElementById('nameError').textContent = 'Customer name is required';
                hasErrors = true;
            }
            
            // Validate email
            if (!email.trim()) {
                document.getElementById('emailError').textContent = 'Email address is required';
                hasErrors = true;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                document.getElementById('emailError').textContent = 'Please enter a valid email address';
                hasErrors = true;
            }
            
            if (!hasErrors) {
                document.getElementById('customerSuccess').textContent = '✓ Customer form validation passed!';
            }
        });

        // Checkout form validation (mimics our React component logic)
        document.getElementById('checkoutForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const title = document.getElementById('title').value;
            const amount = document.getElementById('amount').value;
            
            // Clear previous errors
            document.getElementById('titleError').textContent = '';
            document.getElementById('amountError').textContent = '';
            document.getElementById('checkoutSuccess').textContent = '';
            
            let hasErrors = false;
            
            // Validate title
            if (!title.trim()) {
                document.getElementById('titleError').textContent = 'Checkout title is required';
                hasErrors = true;
            }
            
            // Validate amount
            if (!amount.trim()) {
                document.getElementById('amountError').textContent = 'Amount is required';
                hasErrors = true;
            } else if (isNaN(parseFloat(amount)) || parseFloat(amount) <= 0) {
                document.getElementById('amountError').textContent = 'Please enter a valid amount greater than 0';
                hasErrors = true;
            }
            
            if (!hasErrors) {
                document.getElementById('checkoutSuccess').textContent = '✓ Checkout form validation passed!';
            }
        });

        // Clear errors when user starts typing
        ['name', 'email', 'title', 'amount'].forEach(fieldId => {
            document.getElementById(fieldId).addEventListener('input', function() {
                document.getElementById(fieldId + 'Error').textContent = '';
            });
        });
    </script>
</body>
</html>
